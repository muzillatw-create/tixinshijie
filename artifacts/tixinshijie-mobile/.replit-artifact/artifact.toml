kind = "mobile"
previewPath = "/mobile/"
title = "貼心世界 App"
version = "1.0.0"
id = "artifacts/tixinshijie-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 5000

[services.development]
run = "echo 'Expo Metro server is managed by the Metro Bundler workflow'"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tixinshijie-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tixinshijie-mobile", "run", "serve" ]

[services.env]
PORT = "5000"
BASE_PATH = "/mobile/"
